name: build-and-deploy-glamrock.dev
on:
  # Run after the engine is rebuilt
  workflow_run:
    workflows: ['release-rockstar-engine']
    types: [completed]
    branches: ['main']
  # Run after any website source files are changed
  push:
    branches: ["main"]
    paths:
      - 'glamrock.dev/**'
      - 'codemirror-lang-rockstar/**'
      - '.github/workflows/build-and-deploy-website.yml'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build-main-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          cache-version: 0
          working-directory: ./glamrock.dev
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: fetch rockstar-wasm-binary from cache
        uses: actions/cache/restore@v4
        id: restore-cached-wasm-binary
        with:
          enableCrossOsArchive: true
          path: rockstar-wasm-binary
          key: rockstar-wasm-binary
      - name: Copy WASM binaries into site source
        run: cp -r rockstar-wasm-binary/ glamrock.dev/wasm/
      - name: build CodeMirror editor bundle with Rockstar language support
        run: |
          cd cm-lang-rockstar
          npm install
          npm run test
          npm run prepare
      - name: Build glamrock.dev site
        run: |
          cd glamrock.dev
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./glamrock.dev/_site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-main-site
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
